<h1>保険情報修正（遡及）</h1>
<p>適用日から確定済み月までの保険料差額を算出し、保険情報を更新します。</p>
<p *ngIf="message">{{ message }}</p>

<form [formGroup]="form" (ngSubmit)="submit()">
  <label>社員
    <select formControlName="employeeId">
      <option value="">選択</option>
      <option *ngFor="let employee of employees" [value]="employee.employeeId">
        {{ employee.employeeId }}：{{ employee.firstName }} {{ employee.lastName }}
      </option>
    </select>
  </label>
  <label>適用日 <input type="date" formControlName="applyDate"></label>
  <label>等級 <input type="number" min="0" max="50" formControlName="currentGrade"></label>
  <button type="submit">反映・差額算出</button>
</form>

<table *ngIf="monthlyDiffs.length > 0" class="im-table">
  <thead><tr><th>対象月</th><th>差額</th></tr></thead>
  <tbody>
    <tr *ngFor="let diff of monthlyDiffs">
      <td>{{ diff.payrollId }}</td>
      <td>{{ diff.totalDiff | number }}円</td>
    </tr>
  </tbody>
</table>
