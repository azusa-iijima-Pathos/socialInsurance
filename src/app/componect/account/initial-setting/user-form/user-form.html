<div class="user-form-container">
  <h1 class="im-title">初期登録</h1>


  <div class="information-area" *ngIf="!finishedCompanyForm">
    <p class="im-message">{{ message }}</p>
    <ng-container *ngIf="!companyId">
      <p>会社情報が未登録の場合は会社情報の登録からお願いいたします。</p>
      <button type="button" class="im-btn-soft" (click)="toCompanyForm()">会社情報の初期登録</button>
    </ng-container>

    <ng-container *ngIf="companyId">
      <p>会社情報登録が途中の場合は、会社情報の登録を完了してください。</p>
      <button type="button" class="im-btn-soft" (click)="toContinueCompanyForm()">会社情報登録へ進む</button>
    </ng-container>
  </div>

  <div class="information-area" *ngIf="finishedCompanyForm">
    <p>会社情報の初期登録が完了しました。</p>
    <p>アカウントと社員情報の連携登録を行ってください。</p>
  </div>

  <form class="im-fields-grid user-registration-card" [formGroup]="form" (ngSubmit)="register()">
    <h2>ユーザ情報の初期登録</h2>

    <div class="user-form-pair">
      <div class="im-field-block im-field-row user-form-field">
        <div class="im-field-row__label">
          <label for="companyId">会社ID（半角）</label>
        </div>
        <div class="im-field-row__control">
          <input type="text" id="companyId" formControlName="companyId">
          <div class="error">
            <p *ngIf="form.get('companyId')?.errors?.['required'] && form.get('companyId')?.touched">会社IDは必須です</p>
            <p *ngIf="form.get('companyId')?.errors?.['pattern'] && form.get('companyId')?.touched">会社IDは半角で入力してください</p>

          </div>
        </div>
      </div>

      <div class="im-field-block im-field-row user-form-field">
        <div class="im-field-row__label">
          <label for="employeeId">社員ID（半角）</label>
        </div>
        <div class="im-field-row__control">
          <input type="text" id="employeeId" formControlName="employeeId">
          <div class="error">
            <p *ngIf="form.get('employeeId')?.errors?.['required'] && form.get('employeeId')?.touched">社員IDは必須です</p>
            <p *ngIf="form.get('employeeId')?.errors?.['pattern'] && form.get('employeeId')?.touched">社員IDは半角で入力してください</p>
          </div>
        </div>
      </div>
    </div>

    <div class="user-form-triple">
      <div class="im-field-block im-field-row user-form-field">
        <div class="im-field-row__label">
          <label for="firstName">姓</label>
        </div>
        <div class="im-field-row__control">
          <input type="text" id="firstName" formControlName="firstName">
          <div class="error">
            <p *ngIf="form.get('firstName')?.errors?.['required'] && form.get('firstName')?.touched">姓は必須です</p>
          </div>
        </div>
      </div>
      <div class="im-field-block im-field-row user-form-field">
        <div class="im-field-row__label">
          <label for="lastName">名</label>
        </div>
        <div class="im-field-row__control">
          <input type="text" id="lastName" formControlName="lastName">
          <div class="error">
            <p *ngIf="form.get('lastName')?.errors?.['required'] && form.get('lastName')?.touched">名は必須です</p>
          </div>
        </div>
      </div>
      <div class="im-field-block im-field-row user-form-field">
        <div class="im-field-row__label">
          <label for="birthDate">生年月日</label>
        </div>
        <div class="im-field-row__control">
          <input type="date" id="birthDate" formControlName="birthDate">
          <div class="error">
            <p *ngIf="form.get('birthDate')?.errors?.['required'] && form.get('birthDate')?.touched">生年月日は必須です</p>
          </div>
        </div>
      </div>
    </div>

    <div class="error" *ngIf="form.errors?.['employeeIncorrect']">
      <p>社員情報が正しくありません</p>
    </div>

    <div class="error" *ngIf="errorMessage">
      <p>{{ errorMessage }}</p>
    </div>

    <div class="user-submit-actions">
      <button type="submit" class="im-btn-primary" [disabled]="form.invalid">登録</button>
    </div>

  </form>

</div>
