<div class="header">

    <div class="header-left">
        <h1 class="app-title">
            <button type="button" class="app-title-button" (click)="toTop()"
                [disabled]="!showHeaderActions() || loginEmployeeId() === null">社会保険管理システム</button>
        </h1>
    </div>


    <div class="header-right">
        <ng-container *ngIf="showHeaderActions()">
            <button type="button" class="im-btn-soft" (click)="back()">◀</button>
            <div *ngIf="loginEmployeeId() !== null">
                <button type="button" class="im-btn-soft" *ngIf="permission() === '管理' || permission() === '承認'"
                    (click)="toEmployeeTop()">従業員用ページ</button>
                <button type="button" class="im-btn-soft" *ngIf="permission() === '管理' || permission() === '承認'"
                    (click)="toManageTop()">担当者用ページ</button>
                </div>
                <div class="header-session-panel" *ngIf="loginEmployeeId() !== null">
                    <span class="header-session-panel__item">社員ID: {{ loginEmployeeId() }}</span>
                    <span class="header-session-panel__item">権限: {{ permission() }}</span>
                    <span class="header-session-panel__item" *ngIf="workingYear() && workingMonth()">
                        {{ commonService.targetPeriod() }}
                    </span>
                </div>
            <button type="button" class="im-btn-soft" (click)="logout()">ログアウト</button>
        </ng-container>
    </div>

</div>
