<p *ngIf="message" class="im-action-message office-delete-message">{{ message }}</p>

<div class="im-page-container__content__table office-list-table">
  <div class="office-empty-message" *ngIf="allOffices().length === 0">
    <p>事業所が登録されていません</p>
  </div>

  <table *ngIf="allOffices().length > 0">
    <thead>
      <tr>
        <th>事業所名</th>
        <th>事業所整理記号</th>
        <th>事業所番号</th>
        <th>所在地</th>
        <th>登録日</th>
        <th *ngIf="permission === '管理'" class="office-list-table__actions-header">操作</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let office of allOffices()">
        <td>{{ office.name }}</td>
        <td>{{ office.officeOrganizationSymbol || '—' }}</td>
        <td>{{ office.officeNumber || '—' }}</td>
        <td>{{ office.prefecture }}</td>
        <td>{{ commonService.formatDate(office.createdAt) }}</td>
        <td *ngIf="permission === '管理'" class="office-list-table__actions">
          <button type="button" class="im-btn-primary" (click)="editOffice(office)">編集</button>
          <button type="button" class="im-btn-soft im-btn-soft--danger" (click)="deleteOffice(office)">削除</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<div *ngIf="isOpenModal" class="office-edit-modal" (click)="closeModal()">
  <div class="office-edit-modal__panel" (click)="$event.stopPropagation()">
    <div class="office-edit-modal__header">
      <h3>事業所情報編集</h3>
    </div>
    <form class="im-fields-grid" [formGroup]="form" (ngSubmit)="submitForm()">
      <div class="im-field-block">
        <label for="name">事業所名</label>
        <input type="text" id="name" formControlName="name">
        <div class="error">
          <p *ngIf="form.get('name')?.errors?.['required'] && form.get('name')?.touched">事業所名は必須です</p>
        </div>
      </div>
      <div class="im-field-block">
        <label for="officeOrganizationSymbol">事業所整理記号</label>
        <input type="text" id="officeOrganizationSymbol" formControlName="officeOrganizationSymbol">
        <div class="error">
          <p *ngIf="form.get('officeOrganizationSymbol')?.errors?.['required'] && form.get('officeOrganizationSymbol')?.touched">事業所整理記号は必須です</p>
        </div>
      </div>
      <div class="im-field-block">
        <label for="officeNumber">事業所番号</label>
        <input type="text" id="officeNumber" formControlName="officeNumber">
      </div>
      <div class="im-field-block">
        <label for="prefecture">所在地</label>
        <select id="prefecture" formControlName="prefecture">
          <option *ngFor="let prefecture of PREFECTURES" [value]="prefecture">{{ prefecture }}</option>
        </select>
        <div class="error">
          <p *ngIf="form.get('prefecture')?.errors?.['required'] && form.get('prefecture')?.touched">所在地は必須です</p>
        </div>
      </div>
      <div class="office-edit-modal__actions">
        <button type="button" class="im-btn-soft" (click)="closeModal()">キャンセル</button>
        <button type="submit" class="im-btn-primary">保存</button>
      </div>
    </form>
  </div>
</div>
