<div class="im-page-shell">
  <h2 class="page-title">事業所情報</h2>

  <div class="office-detail-layout">
    <section class="im-surface-panel im-section-block office-detail-list">
      <h3 class="section-title">事業所一覧</h3>
      <app-office-list></app-office-list>
    </section>

    <section class="im-surface-panel im-section-block office-detail-register" *ngIf="permission === '管理'">
      <h3 class="section-title">事業所新規登録</h3>
      <form class="im-fields-grid" [formGroup]="form" (ngSubmit)="registerOffice()">
        <div class="im-field-block">
          <label for="name">事業所名</label>
          <input type="text" id="name" formControlName="name">
          <div class="error">
            <p *ngIf="form.get('name')?.errors?.['required'] && form.get('name')?.touched">事業所名は必須です</p>
          </div>
        </div>
        <div class="im-field-block">
          <label for="officeOrganizationSymbol">事業所整理記号</label>
          <input type="text" id="officeOrganizationSymbol" formControlName="officeOrganizationSymbol">
          <div class="error">
            <p *ngIf="form.get('officeOrganizationSymbol')?.errors?.['required'] && form.get('officeOrganizationSymbol')?.touched">事業所整理記号は必須です</p>
          </div>
        </div>
        <div class="im-field-block">
          <label for="officeNumber">事業所番号</label>
          <input type="text" id="officeNumber" formControlName="officeNumber">
        </div>
        <div class="im-field-block">
          <label for="prefecture">所在地</label>
          <select id="prefecture" formControlName="prefecture">
            <option [value]=""></option>
            <option *ngFor="let prefecture of PREFECTURES" [value]="prefecture">{{ prefecture }}</option>
          </select>
          <div class="error">
            <p *ngIf="form.get('prefecture')?.errors?.['required'] && form.get('prefecture')?.touched">所在地は必須です</p>
          </div>
        </div>
        <div class="form-footer-actions">
          <button type="submit" class="im-btn-primary">保存</button>
        </div>
      </form>
    </section>
  </div>
</div>
